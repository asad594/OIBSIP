<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Login')}"></head>
<body>
    
    <div class="auth-wrapper">
        <div class="glass-panel auth-card">
            <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
            
            <div th:if="${error}" class="badge badge-danger mb-2" style="display: block; text-align: center;" th:text="${error}"></div>
            
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login to Library</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem;">
                Don't have an account? <a th:href="@{/register}" style="color: var(--primary); text-decoration: none; font-weight: 500;">Register here</a>
            </p>
        </div>
    </div>

</body>
</html>
