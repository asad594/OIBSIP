<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Contact Admin')}"></head>
<body>
    <div th:replace="~{fragments :: nav}"></div>

    <div class="container" style="max-width: 600px;">
        <div class="glass-panel mt-2">
            <h2 class="mb-2">Contact Administration</h2>
            
            <form th:action="@{/user/contact}" method="post">
                <div class="form-group">
                    <label for="message">Your Message or Query</label>
                    <textarea id="message" name="message" class="form-control" rows="6" required placeholder="Type your query here..."></textarea>
                </div>
                <div class="d-flex justify-between align-center">
                    <a th:href="@{/user/dashboard}" style="color: var(--text-muted); text-decoration: none;">Back to Dashboard</a>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
