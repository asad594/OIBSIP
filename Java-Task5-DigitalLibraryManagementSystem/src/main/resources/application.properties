spring.application.name=digital-library

# Database Configuration (MS SQL Server with Windows Authentication)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=librarydb;integratedSecurity=true;encrypt=true;trustServerCertificate=true;
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA Properties
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (disabled for MSSQL)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# Server Port
server.port=8081

# Logging
logging.level.org.springframework.security=INFO
